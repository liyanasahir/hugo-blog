{{ if .Param "math" }}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.21/dist/katex.min.css" crossorigin="anonymous">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.21/dist/katex.min.js" crossorigin="anonymous"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.21/dist/contrib/auto-render.min.js" crossorigin="anonymous"
    onload="renderMathInElement(document.body, {
      delimiters: [
        {left: '$$', right: '$$', display: true},
        {left: '$', right: '$', display: false}
      ]
    });"></script>
{{ end }}

<!-- Malayalam font for accent text -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manjari:wght@400;700&display=swap" rel="stylesheet">

<!-- Memory footnotes -->
<script defer>
document.addEventListener('DOMContentLoaded', function() {
  var counter = 0;
  document.querySelectorAll('.memory-note').forEach(function(note) {
    counter++;
    note.querySelector('.memory-marker').textContent = counter;
    note.querySelector('.memory-marker').addEventListener('click', function(e) {
      e.preventDefault();
      var content = note.querySelector('.memory-content');
      var isOpen = content.classList.contains('open');
      // Close all others first
      document.querySelectorAll('.memory-content.open').forEach(function(c) {
        c.classList.remove('open');
      });
      if (!isOpen) {
        content.classList.add('open');
      }
    });
  });
});
</script>
